services:
  postgres:
    image: postgres:15-alpine
    container_name: bulk-notifs-postgres
    environment:
      POSTGRES_DB: bulksaas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bulk-notifs-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bulk-notifs-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - bulk-notifs-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api
    container_name: bulk-notifs-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/bulksaas?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-secret-key-change-in-production
      JWT_REFRESH_SECRET: your-refresh-secret-key
      SERVER_PORT: 8080
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bulk-notifs-network
    restart: unless-stopped

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    container_name: bulk-notifs-worker
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/bulksaas?sslmode=disable
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bulk-notifs-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bulk-notifs-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    depends_on:
      - backend-api
    networks:
      - bulk-notifs-network
    restart: unless-stopped

  asynqmon:
    image: hibiken/asynqmon:latest
    container_name: bulk-notifs-asynqmon
    ports:
      - "8095:8080"
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bulk-notifs-network
    restart: unless-stopped

networks:
  bulk-notifs-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
